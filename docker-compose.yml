version: '3.8'

services:
  fastapi-server:
    build: .
    container_name: agentsphere-fastapi
    environment:
      - DATABASE_PATH=/app/data/checkpoints.sqlite
      - REDIS_URL=redis://redis-cache:6379/0
      - QDRANT_URL=http://qdrant-db:6333
    volumes:
      - checkpoints_data:/app/data
    expose:
      - "8000"
    depends_on:
      - redis-cache
      - qdrant-db
    restart: always

  nginx-proxy:
    image: nginx:alpine
    container_name: agentsphere-nginx
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"
    depends_on:
      - fastapi-server
    restart: always

  redis-cache:
    image: redis:alpine
    container_name: agentsphere-redis
    expose:
      - "6379"
    restart: always

  qdrant-db:
    image: qdrant/qdrant:latest
    container_name: agentsphere-qdrant
    expose:
      - "6333"
      - "6334"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: always

volumes:
  checkpoints_data:
  qdrant_data:
