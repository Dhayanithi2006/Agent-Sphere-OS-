<!DOCTYPE html>
<!-- Backwards compatibility fallback hooks: EventSource("/stream") -->
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AgentSphere OS — Microkernel Console</title>
  <link rel="icon" href="data:,">
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Google Fonts: Inter & JetBrains Mono -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <!-- React UMD builds -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <!-- Babel Standalone compiler -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
            mono: ['JetBrains Mono', 'monospace'],
          },
          colors: {
            brand: {
              bg: '#04060a',
              card: '#0a0f1d',
              cardLight: '#11182c',
              border: '#1e293b',
              accent: '#38bdf8',
              glow: '#0ea5e9',
            }
          }
        }
      }
    }
  </script>
  <style>
    body {
      background-color: #04060a;
      overflow-x: hidden;
    }
    /* Custom scrollbars */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: #04060a; }
    ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #38bdf8; }
  </style>
</head>
<body class="text-slate-200 antialiased min-h-screen flex flex-col font-sans">
  <div id="root" class="flex flex-col flex-1"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    function App() {
      const [activeTab, setActiveTab] = useState('showrunner');
      const [systemMetrics, setSystemMetrics] = useState({
        cpu_percent: 0,
        memory: { total: 0, used: 0, free: 0, percent: 0 },
        disk: { total: 0, used: 0, free: 0, percent: 0 }
      });
      const [dependencyGraph, setDependencyGraph] = useState({ nodes: [], edges: [], has_cycle: false, topological_order: [] });
      const [executions, setExecutions] = useState({ metrics: { total_executions: 0, success_count: 0, failure_count: 0 }, history: [] });
      const [tokenCost, setTokenCost] = useState({ total_calls: 0, total_prompt_tokens: 0, total_completion_tokens: 0, total_cost: 0.0 });
      const [checkpoints, setCheckpoints] = useState([]);
      const [processes, setProcesses] = useState([]);
      const [events, setEvents] = useState([]);
      const [memorySnapshot, setMemorySnapshot] = useState({});
      
      // Form states
      const [newTask, setNewTask] = useState({ agent_id: 'planner', task: '', priority: 'medium' });
      const [newPlugin, setNewPlugin] = useState({ file_path: '', class_name: '', agent_id: '' });
      const [newDependency, setNewDependency] = useState({ source: 'planner', target: 'researcher' });
      const [newMemory, setNewMemory] = useState({ namespace: '', key: '', value: '' });
      const [settings, setSettings] = useState({
        qwen_api_key: '',
        qwen_base_url: '',
        qwen_model: '',
        max_workers: 4
      });
      
      const [logsList, setLogsList] = useState([]);
      const [wsStatus, setWsStatus] = useState('connecting');
      const wsRef = useRef(null);

      // Showrunner States
      const [showrunnerStatus, setShowrunnerStatus] = useState({
        movie_goal: '',
        user: 'Alice',
        type: 'Movie',
        progress: 'Idle',
        status: 'idle',
        approval_state: 'none',
        current_agent: '',
        storyboard: null,
        final_movie: null,
        review_report: '',
        cost_breakdown: {
          planner: 0.02,
          script: 0.01,
          storyboard: 0.03,
          scene_video: 0.01,
          reviewer: 0.01,
          total: 0.08
        }
      });
      const [inputGoal, setInputGoal] = useState('Create another coffee commercial');
      const [selectedUser, setSelectedUser] = useState('Alice');
      const [selectedType, setSelectedType] = useState('Movie');
      const [simulateFailure, setSimulateFailure] = useState(false);

      // Fetch initial Showrunner Status on mount (WebSocket takes over afterwards)
      useEffect(() => {
        const fetchInitialStatus = async () => {
          try {
            const res = await fetch('/api/showrunner/status');
            if (res.ok) {
              const data = await res.json();
              setShowrunnerStatus(data);
            }
          } catch (err) {
            console.error("Error fetching showrunner status on mount:", err);
          }
        };
        fetchInitialStatus();
      }, []);

      const startProduction = async (e) => {
        if (e) e.preventDefault();
        try {
          const res = await fetch('/api/showrunner/generate', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              movie_goal: inputGoal,
              user: selectedUser,
              type: selectedType,
              simulate_failure: simulateFailure
            })
          });
          if (res.ok) {
            alert("Production Pipeline started!");
          } else {
            const errText = await res.text();
            alert(`Failed to start production: Server returned status ${res.status} - ${errText}`);
          }
        } catch (err) {
          alert("Failed to start production: " + err);
        }
      };

      const triggerApprove = async () => {
        try {
          const res = await fetch('/api/showrunner/approve', { method: 'POST' });
          if (res.ok) {
            alert("Storyboard approved!");
          }
        } catch (err) {
          alert("Approval failed: " + err);
        }
      };

      const clearSemanticCache = async () => {
        if (!confirm("Are you sure you want to clear the semantic cache? This will reset all cached agent prompt completions and force all agents to run dynamically.")) return;
        try {
          const res = await fetch('/api/memory/clear', { method: 'POST' });
          if (res.ok) {
            alert("Semantic cache and shared memory cleared successfully!");
          } else {
            alert("Failed to clear semantic cache.");
          }
        } catch (err) {
          alert("Failed to clear semantic cache: " + err);
        }
      };


      // Fetch static graphs and historical details
      const fetchStaticData = async () => {
        try {
          const [depRes, execRes, checkRes, settingsRes] = await Promise.all([
            fetch('/api/dashboard/dependency-graph'),
            fetch('/api/dashboard/executions'),
            fetch('/api/dashboard/checkpoints'),
            fetch('/api/dashboard/settings')
          ]);
          if (depRes.ok) setDependencyGraph(await depRes.json());
          if (execRes.ok) {
            const data = await execRes.json();
            setExecutions(data);
            const historyWithLogs = data.history.filter(h => h.stdout || h.stderr);
            setLogsList(historyWithLogs);
          }
          if (checkRes.ok) setCheckpoints(await checkRes.json());
          if (settingsRes.ok) setSettings(await settingsRes.json());
        } catch (err) {
          console.error("Error fetching static data:", err);
        }
      };

      // Connect to WS backend dynamically
      useEffect(() => {
        fetchStaticData();

        const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
        const wsUrl = `${protocol}//${window.location.host}/api/dashboard/ws`;
        const socket = new WebSocket(wsUrl);
        wsRef.current = socket;

        socket.onopen = () => setWsStatus('connected');
        socket.onclose = () => setWsStatus('disconnected');
        socket.onerror = () => setWsStatus('error');
        socket.onmessage = (event) => {
          try {
            const data = JSON.parse(event.data);
            if (data.type === 'dashboard_update') {
              if (data.system) setSystemMetrics(data.system);
              if (data.processes) setProcesses(data.processes);
              if (data.llm_usage) setTokenCost(data.llm_usage);
              if (data.events) setEvents(data.events);
              if (data.memory_snapshot) setMemorySnapshot(data.memory_snapshot);
            } else if (data.type === 'event') {
              if (data.event_type === 'SHOWRUNNER_UPDATE') {
                setShowrunnerStatus(data.payload);
              }
              // Append to events console feed
              setEvents(prev => [data, ...prev].slice(0, 15));
            }
          } catch (err) {
            console.error("WS Parse error:", err);
          }
        };

        return () => {
          socket.close();
        };
      }, []);

      // Handlers
      const dispatchTask = async (e) => {
        e.preventDefault();
        if (!newTask.task.trim()) return;
        try {
          const response = await fetch('/assign', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(newTask),
          });
          if (response.ok) {
            setNewTask({ ...newTask, task: '' });
            fetchStaticData();
          }
        } catch (err) {
          console.error("Submit task error:", err);
        }
      };

      // Manual Process lifecycle buttons
      const handleSuspend = async (pid) => {
        try {
          const res = await fetch(`/api/dashboard/processes/${pid}/suspend`, { method: 'POST' });
          if (!res.ok) alert("Suspend failed");
        } catch (err) {
          alert(`Error: ${err}`);
        }
      };

      const handleResume = async (pid) => {
        try {
          const res = await fetch(`/api/dashboard/processes/${pid}/resume`, { method: 'POST' });
          if (!res.ok) alert("Resume failed");
        } catch (err) {
          alert(`Error: ${err}`);
        }
      };

      const handleKill = async (pid) => {
        try {
          const res = await fetch(`/api/dashboard/processes/${pid}/kill`, { method: 'POST' });
          if (!res.ok) alert("Kill failed");
        } catch (err) {
          alert(`Error: ${err}`);
        }
      };

      const triggerRecovery = async (taskId) => {
        if (!taskId) {
          alert("No associated Task ID found for this process.");
          return;
        }
        try {
          const response = await fetch(`/recovery?task_id=${taskId}`, { method: 'POST' });
          if (response.ok) {
            alert(`Recovery plan triggered successfully for: ${taskId}`);
          } else {
            alert("Failed to trigger recovery plan");
          }
        } catch (err) {
          alert(`Error: ${err}`);
        }
      };

      const loadPlugin = async (e) => {
        e.preventDefault();
        if (!newPlugin.file_path || !newPlugin.class_name || !newPlugin.agent_id) return;
        try {
          const response = await fetch('/api/processes', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              action: 'load_plugin',
              file_path: newPlugin.file_path,
              class_name: newPlugin.class_name,
              agent_id: newPlugin.agent_id
            }),
          });
          if (response.ok) {
            alert("Plugin imported and loaded successfully!");
            setNewPlugin({ file_path: '', class_name: '', agent_id: '' });
          } else {
            const err = await response.json();
            alert(`Failed: ${err.detail || 'Plugin validation rejected.'}`);
          }
        } catch (err) {
          alert(`Error: ${err}`);
        }
      };

      // Manual Dependency DAG links
      const handleAddDependency = async (e) => {
        e.preventDefault();
        try {
          const res = await fetch('/api/dashboard/dependency', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(newDependency)
          });
          if (res.ok) {
            fetchStaticData();
          } else {
            alert("Failed to add dependency link");
          }
        } catch (err) {
          alert(`Error: ${err}`);
        }
      };

      const handleRemoveDependency = async (source, target) => {
        try {
          const res = await fetch(`/api/dashboard/dependency?source=${source}&target=${target}`, {
            method: 'DELETE'
          });
          if (res.ok) {
            fetchStaticData();
          }
        } catch (err) {
          alert(`Error: ${err}`);
        }
      };

      // Shared Memory manual writes
      const handleWriteMemory = async (e) => {
        e.preventDefault();
        if (!newMemory.key || !newMemory.value) return;
        try {
          const res = await fetch('/memory', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              namespace: newMemory.namespace || null,
              key: newMemory.key,
              value: newMemory.value
            })
          });
          if (res.ok) {
            setNewMemory({ namespace: '', key: '', value: '' });
          }
        } catch (err) {
          alert(`Error: ${err}`);
        }
      };

      const handleDeleteMemory = async (fullKey) => {
        let key = fullKey;
        let namespace = null;
        if (fullKey.includes(':')) {
          const parts = fullKey.split(':');
          namespace = parts[0];
          key = parts[1];
        }
        try {
          const url = namespace ? `/memory/${key}?namespace=${namespace}` : `/memory/${key}`;
          const res = await fetch(url, { method: 'DELETE' });
          if (!res.ok) alert("Failed to delete memory key");
        } catch (err) {
          alert(`Error: ${err}`);
        }
      };

      const updateSettings = async (e) => {
        e.preventDefault();
        try {
          const response = await fetch('/api/dashboard/settings', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(settings),
          });
          if (response.ok) {
            alert("Configurations saved and persisted successfully!");
            fetchStaticData();
          }
        } catch (err) {
          alert(`Error updating settings: ${err}`);
        }
      };

      const getStatusColor = (status) => {
        switch (String(status).toUpperCase()) {
          case 'RUNNING': return 'bg-amber-500/10 text-amber-400 border border-amber-500/20';
          case 'COMPLETED': case 'READY': return 'bg-emerald-500/10 text-emerald-400 border border-emerald-500/20';
          case 'SUSPENDED': return 'bg-indigo-500/10 text-indigo-400 border border-indigo-500/20';
          case 'FAILED': return 'bg-rose-500/10 text-rose-400 border border-rose-500/20';
          default: return 'bg-slate-500/10 text-slate-400 border border-slate-500/20';
        }
      };

      const getAgentStatusClass = (agentId) => {
        const isCurrent = showrunnerStatus.current_agent === agentId && showrunnerStatus.status === 'running';
        const stepsOrder = [
          'showrunner_planner',
          'showrunner_script',
          'showrunner_storyboard',
          'showrunner_researcher',
          'showrunner_voice',
          'showrunner_scene',
          'showrunner_prompt',
          'showrunner_video',
          'showrunner_audio',
          'showrunner_subtitle',
          'showrunner_editor',
          'showrunner_reviewer',
          'showrunner_publisher'
        ];
        const currentIdx = stepsOrder.indexOf(showrunnerStatus.current_agent);
        const agentIdx = stepsOrder.indexOf(agentId);
        
        const isFailed = showrunnerStatus.progress.includes("FAILED") && showrunnerStatus.current_agent === agentId;
        const isRecovering = showrunnerStatus.progress.includes("Recovery") && showrunnerStatus.current_agent === agentId;
        
        if (isFailed) return 'bg-rose-500/20 border-rose-500/50 text-rose-400 shadow-md shadow-rose-500/10 animate-bounce';
        if (isRecovering) return 'bg-amber-500/25 border-amber-500/60 text-amber-300 shadow-md shadow-amber-500/10 animate-pulse';
        if (showrunnerStatus.status === 'completed' || (showrunnerStatus.status === 'running' && agentIdx < currentIdx)) {
          return 'bg-emerald-500/15 border-emerald-500/40 text-emerald-400';
        }
        if (isCurrent) {
          return 'bg-amber-500/15 border-amber-500/40 text-amber-300 shadow-md shadow-amber-500/5 animate-pulse';
        }
        return 'bg-brand-cardLight/50 border-brand-border/60 text-slate-500';
      };

      const renderAgentMetrics = (agentId) => {
        const metric = showrunnerStatus.agents_metrics?.[agentId];
        if (!metric || (!metric.prompt_tokens && !metric.cost && !metric.duration)) return null;
        return (
          <div class="mt-1 pt-1 border-t border-brand-border/40 text-[9px] font-mono text-slate-400 flex flex-wrap justify-center gap-x-2 gap-y-0.5">
            <span>In/Out: <strong>{metric.prompt_tokens}/{metric.completion_tokens}</strong></span>
            <span>Time: <strong>{metric.duration.toFixed(1)}s</strong></span>
            <span>Cost: <strong class="text-brand-accent">${metric.cost.toFixed(4)}</strong></span>
            {metric.retries > 0 && <span class="text-rose-400">Retries: <strong>{metric.retries}</strong></span>}
          </div>
        );
      };

      return (
        <div class="flex flex-col flex-1 h-screen overflow-hidden">
          {/* Top navigation header */}
          <header class="bg-brand-card border-b border-brand-border px-6 py-4 flex items-center justify-between shadow-lg">
            <div class="flex items-center gap-3">
              <div class="h-9 w-9 bg-gradient-to-tr from-brand-accent to-indigo-600 rounded-xl flex items-center justify-center shadow-md shadow-brand-accent/20">
                <span class="font-bold text-white text-lg">A</span>
              </div>
              <div>
                <h1 class="font-extrabold text-white tracking-wide text-md">AgentSphere OS v4</h1>
                <p class="text-xs text-slate-400">Microkernel AI Control Deck</p>
              </div>
            </div>
            
            <div class="flex items-center gap-4 text-xs">
              <div class="flex items-center gap-2 bg-brand-cardLight border border-brand-border px-3 py-1.5 rounded-full">
                <span class={`h-2.5 w-2.5 rounded-full ${wsStatus === 'connected' ? 'bg-emerald-500 animate-pulse' : 'bg-rose-500'}`}></span>
                <span class="capitalize text-slate-400">WS Live: <strong class="text-slate-200">{wsStatus}</strong></span>
              </div>
              <div class="bg-brand-cardLight border border-brand-border px-3 py-1.5 rounded-full text-slate-400">
                Total Runs: <strong class="text-brand-accent">{executions.metrics.total_executions}</strong>
              </div>
            </div>
          </header>

          {/* Main workspace layout */}
          <div class="flex flex-1 overflow-hidden">
            {/* Sidebar navigation */}
            <aside class="w-64 bg-brand-card border-r border-brand-border p-4 flex flex-col justify-between">
              <nav class="space-y-1">
                {[
                  { id: 'showrunner', name: 'Showrunner Studio', icon: '🎬' },
                  { id: 'tasks', name: 'Task Manager', icon: '⚡' },
                  { id: 'agents', name: 'Agents & Plugins', icon: '🤖' },
                  { id: 'dependencies', name: 'Dependency Graph', icon: '🕸️' },
                  { id: 'resources', name: 'Resource Monitor', icon: '📊' },
                  { id: 'memory', name: 'Shared Memory', icon: '💾' },
                  { id: 'events', name: 'Event Bus', icon: '📢' },
                  { id: 'logs', name: 'Process Logs', icon: '📝' },
                  { id: 'settings', name: 'Settings', icon: '⚙️' }
                ].map((item) => (
                  <button
                    key={item.id}
                    onClick={() => setActiveTab(item.id)}
                    class={`w-full flex items-center gap-3 px-4 py-2.5 rounded-lg text-sm font-semibold transition-all duration-200 ${
                      activeTab === item.id
                        ? 'bg-brand-accent/15 text-brand-accent shadow-sm shadow-brand-accent/5'
                        : 'text-slate-400 hover:bg-slate-800/20 hover:text-slate-200'
                    }`}
                  >
                    <span>{item.icon}</span>
                    <span>{item.name}</span>
                  </button>
                ))}
              </nav>
              <div class="bg-brand-cardLight border border-brand-border rounded-xl p-3.5 text-center text-xs">
                <span class="block text-slate-500 font-bold mb-1 uppercase tracking-wider">Accumulated Cost</span>
                <span class="text-lg font-extrabold text-brand-accent">${tokenCost.total_cost.toFixed(4)}</span>
              </div>
            </aside>

            {/* Active view component body */}
            <main class="flex-1 p-6 overflow-y-auto bg-brand-bg flex flex-col">
              {activeTab === 'showrunner' && (
                <div class="space-y-6">
                  {/* Studio Configuration Header */}
                  <div class="bg-brand-card border border-brand-border rounded-2xl p-6 shadow-md">
                    <div class="flex items-center justify-between mb-4 border-b border-brand-border/60 pb-3">
                      <div>
                        <h2 class="text-lg font-bold flex items-center gap-2 text-white">
                          <span>🎬</span> AI Showrunner Production Studio
                        </h2>
                        <p class="text-xs text-slate-400">Generate fully autonomous movies, commercials, or podcasts via AgentSphere OS.</p>
                      </div>
                      <span class={`px-3 py-1 rounded-full text-xs font-mono font-bold uppercase tracking-wider ${
                        showrunnerStatus.status === 'running' ? 'bg-amber-500/10 text-amber-400 border border-amber-500/20 animate-pulse' :
                        showrunnerStatus.status === 'completed' ? 'bg-emerald-500/10 text-emerald-400 border border-emerald-500/20' :
                        showrunnerStatus.status === 'failed' ? 'bg-rose-500/10 text-rose-400 border border-rose-500/20' :
                        'bg-slate-500/10 text-slate-400 border border-slate-500/20'
                      }`}>
                        Studio State: {showrunnerStatus.status}
                      </span>
                    </div>

                    <form onSubmit={startProduction} class="grid grid-cols-1 md:grid-cols-4 gap-4 items-end">
                      <div class="space-y-2">
                        <label class="text-xs text-slate-400 font-semibold">User Context</label>
                        <select
                          value={selectedUser}
                          onChange={(e) => setSelectedUser(e.target.value)}
                          class="bg-brand-cardLight border border-brand-border px-3 py-2 rounded-lg text-sm text-slate-200 focus:outline-none w-full"
                        >
                          <option value="Alice">Alice (Movie Studio)</option>
                          <option value="Bob">Bob (Podcast Studio)</option>
                          <option value="Charlie">Charlie (Commercial Agency)</option>
                        </select>
                      </div>
                      
                      <div class="space-y-2">
                        <label class="text-xs text-slate-400 font-semibold">Project Type</label>
                        <select
                          value={selectedType}
                          onChange={(e) => setSelectedType(e.target.value)}
                          class="bg-brand-cardLight border border-brand-border px-3 py-2 rounded-lg text-sm text-slate-200 focus:outline-none w-full"
                        >
                          <option value="Movie">Sci-Fi Short Film</option>
                          <option value="Podcast">Interactive Talk-show Podcast</option>
                          <option value="Advertisement">Vibrant Coffee Commercial</option>
                        </select>
                      </div>

                      <div class="space-y-2 md:col-span-2">
                        <label class="text-xs text-slate-400 font-semibold">Movie Production Goal (Prompt)</label>
                        <div class="flex gap-2">
                          <input
                            type="text"
                            value={inputGoal}
                            onChange={(e) => setInputGoal(e.target.value)}
                            placeholder="e.g. A high-tech coffee commercial in Neo-Tokyo"
                            class="bg-brand-cardLight border border-brand-border px-3 py-2 rounded-lg text-sm text-slate-200 focus:outline-none w-full"
                          />
                          <button
                            type="submit"
                            disabled={showrunnerStatus.status === 'running'}
                            class="bg-brand-accent hover:bg-brand-accent/90 disabled:bg-slate-700 disabled:text-slate-400 text-slate-950 font-bold text-sm px-6 py-2 rounded-lg shadow-md transition-all duration-200 whitespace-nowrap"
                          >
                            Generate Film
                          </button>
                        </div>
                      </div>
                    </form>

                    <div class="flex items-center gap-6 mt-4 pt-3 border-t border-brand-border/40 text-xs">
                      <label class="flex items-center gap-2 cursor-pointer text-slate-400 hover:text-slate-200">
                        <input
                          type="checkbox"
                          checked={simulateFailure}
                          onChange={(e) => setSimulateFailure(e.target.checked)}
                          class="rounded border-slate-700 bg-slate-900 text-brand-accent focus:ring-brand-accent"
                        />
                        <span>Simulate Video Failure (Recovery Engine Demo)</span>
                      </label>
                      
                      <div class="flex items-center gap-3 text-slate-400">
                        <div class="flex items-center gap-1.5">
                          <span class="inline-block w-2.5 h-2.5 rounded-full bg-emerald-500 animate-pulse"></span>
                          <span>Semantic Cache: Active</span>
                        </div>
                        <button
                          type="button"
                          onClick={clearSemanticCache}
                          class="text-[10px] text-brand-accent hover:text-brand-accent/80 border border-brand-border px-2 py-0.5 rounded bg-brand-cardLight transition-all"
                        >
                          Clear Cache
                        </button>

                      </div>
                      <div class="space-y-2">
                        <label class="text-xs text-slate-400 font-semibold">Python Class Name</label>
                        <input
                          type="text"
                          placeholder="e.g. CustomAgent"
                          value={newPlugin.class_name}
                          onChange={(e) => setNewPlugin({ ...newPlugin, class_name: e.target.value })}
                          class="bg-brand-cardLight border border-brand-border px-3 py-2 rounded-lg text-sm text-slate-200 focus:outline-none w-full"
                        />
                      </div>
                      <div class="space-y-2">
                        <label class="text-xs text-slate-400 font-semibold">Unique Agent ID</label>
                        <input
                          type="text"
                          placeholder="e.g. custom_coder"
                          value={newPlugin.agent_id}
                          onChange={(e) => setNewPlugin({ ...newPlugin, agent_id: e.target.value })}
                          class="bg-brand-cardLight border border-brand-border px-3 py-2 rounded-lg text-sm text-slate-200 focus:outline-none w-full"
                        />
                      </div>
                      <button type="submit" class="bg-brand-accent hover:bg-brand-accent/90 text-slate-950 font-bold text-sm px-5 py-2.5 rounded-lg shadow-md transition-all duration-200">
                        Hot Load Plugin
                      </button>
                    </form>
                  </div>

                  {/* Registered Core Agents Grid */}
                  <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                    {[
                      { id: 'planner', name: 'Planner', desc: 'Handles high-level workflow task decomposition.', icon: '🗺️' },
                      { id: 'researcher', name: 'Researcher', desc: 'Queries models for topic backgrounds and docs.', icon: '🔍' },
                      { id: 'developer', name: 'Developer', desc: 'Writes codebase Python implementations.', icon: '💻' },
                      { id: 'tester', name: 'Tester', desc: 'Generates unit testing assert verifications.', icon: '🧪' },
                      { id: 'reviewer', name: 'Reviewer', desc: 'Polishes inputs and audits code syntax quality.', icon: '📋' }
                    ].map((agt) => (
                      <div key={agt.id} class="bg-brand-card border border-brand-border p-5 rounded-2xl flex flex-col justify-between hover:border-brand-accent/40 transition-all duration-300">
                        <div>
                          <div class="text-3xl mb-3">{agt.icon}</div>
                          <h3 class="text-md font-bold mb-1.5">{agt.name}</h3>
                          <p class="text-xs text-slate-400 leading-relaxed mb-4">{agt.desc}</p>
                        </div>
                        <div class="flex items-center justify-between text-xs border-t border-brand-border/60 pt-3">
                          <span class="text-slate-500 font-mono">ID: {agt.id}</span>
                          <span class="px-2 py-0.5 rounded-full text-emerald-400 bg-emerald-500/10 font-bold border border-emerald-500/20">Active</span>
                        </div>
                      </div>
                    ))}
                  </div>
                </div>
              )}

              {activeTab === 'dependencies' && (
                <div class="space-y-6 flex-1 flex flex-col">
                  {/* Manual dependency adder form */}
                  <div class="bg-brand-card border border-brand-border rounded-2xl p-6 shadow-md">
                    <h2 class="text-md font-bold mb-4 flex items-center gap-2">
                      <span>🔗</span> Establish Manual Dependency Edge
                    </h2>
                    <form onSubmit={handleAddDependency} class="grid grid-cols-1 md:grid-cols-3 gap-4 items-end">
                      <div class="space-y-2">
                        <label class="text-xs text-slate-400 font-semibold">Source Agent (Prerequisite)</label>
                        <select
                          value={newDependency.source}
                          onChange={(e) => setNewDependency({ ...newDependency, source: e.target.value })}
                          class="bg-brand-cardLight border border-brand-border px-3 py-2 rounded-lg text-sm text-slate-200 focus:outline-none w-full"
                        >
                          <option value="planner">Planner</option>
                          <option value="researcher">Researcher</option>
                          <option value="developer">Developer</option>
                          <option value="tester">Tester</option>
                          <option value="reviewer">Reviewer</option>
                        </select>
                      </div>
                      <div class="space-y-2">
                        <label class="text-xs text-slate-400 font-semibold">Target Agent (Dependent)</label>
                        <select
                          value={newDependency.target}
                          onChange={(e) => setNewDependency({ ...newDependency, target: e.target.value })}
                          class="bg-brand-cardLight border border-brand-border px-3 py-2 rounded-lg text-sm text-slate-200 focus:outline-none w-full"
                        >
                          <option value="planner">Planner</option>
                          <option value="researcher">Researcher</option>
                          <option value="developer">Developer</option>
                          <option value="tester">Tester</option>
                          <option value="reviewer">Reviewer</option>
                        </select>
                      </div>
                      <button type="submit" class="bg-brand-accent hover:bg-brand-accent/90 text-slate-950 font-bold text-sm px-5 py-2.5 rounded-lg shadow-md transition-all duration-200">
                        Create Link Connection
                      </button>
                    </form>
                  </div>

                  <div class="bg-brand-card border border-brand-border rounded-2xl p-6 shadow-md flex-1 flex flex-col">
                    <div class="flex items-center justify-between mb-4">
                      <h2 class="text-md font-bold flex items-center gap-2">
                        <span>🕸️</span> Dependency Topology DAG
                      </h2>
                      {dependencyGraph.has_cycle && (
                        <span class="px-2.5 py-1 rounded bg-rose-500/10 text-rose-400 border border-rose-500/20 text-xs font-bold animate-pulse">
                          Cycle Warning Detected
                        </span>
                      )}
                    </div>
                    
                    {/* Topo Order */}
                    <div class="mb-6 bg-brand-cardLight border border-brand-border p-3 rounded-xl flex items-center gap-2 overflow-x-auto text-xs">
                      <span class="text-slate-500 font-bold uppercase tracking-wider whitespace-nowrap">Execution Sequence:</span>
                      {dependencyGraph.topological_order.map((node, i) => (
                        <React.Fragment key={node}>
                          {i > 0 && <span class="text-slate-600">➔</span>}
                          <span class="bg-brand-accent/15 text-brand-accent px-2 py-1 rounded font-semibold font-mono">{node}</span>
                        </React.Fragment>
                      ))}
                      {dependencyGraph.topological_order.length === 0 && <span class="text-slate-500">No nodes in topology.</span>}
                    </div>

                    {/* SVG Render box */}
                    <div class="border border-brand-border bg-brand-cardLight/50 rounded-xl flex-1 relative flex items-center justify-center p-6 min-h-[300px]">
                      <div class="text-center space-y-6">
                        <div class="flex flex-wrap justify-center gap-8">
                          {dependencyGraph.nodes.map((node) => (
                            <div key={node.id} class="bg-brand-card border border-brand-border p-4 rounded-xl shadow-md min-w-[120px] text-center">
                              <span class="font-bold text-sm block mb-1 text-slate-200">{node.label}</span>
                              <span class="text-[10px] text-brand-accent font-mono block">Node ID: {node.id}</span>
                            </div>
                          ))}
                        </div>
                        
                        <div class="text-xs text-slate-400 pt-4 max-w-xl mx-auto">
                          <span class="block text-slate-500 uppercase font-bold text-[10px] tracking-wider mb-2">Established Dependency Edges:</span>
                          <div class="flex flex-wrap justify-center gap-2">
                            {dependencyGraph.edges.map((e, idx) => (
                              <div key={idx} class="inline-flex items-center gap-2 bg-slate-900 border border-brand-border px-3 py-1 rounded-full font-mono text-xs text-slate-300">
                                <span>{e.from} ➔ {e.to}</span>
                                <button
                                  onClick={() => handleRemoveDependency(e.from, e.to)}
                                  class="text-rose-400 hover:text-rose-600 font-bold ml-1"
                                  title="Delete Link"
                                >
                                  ×
                                </button>
                              </div>
                            ))}
                            {dependencyGraph.edges.length === 0 && <span class="text-slate-500">No dependencies established.</span>}
                          </div>
                        </div>
                      </div>
                    </div>
                  </div>
                </div>
              )}

              {activeTab === 'resources' && (
                <div class="space-y-6">
                  {/* Resource meters */}
                  <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                    {/* CPU */}
                    <div class="bg-brand-card border border-brand-border p-5 rounded-2xl">
                      <span class="text-xs font-bold text-slate-500 uppercase tracking-wider block mb-2">CPU Utilization</span>
                      <div class="text-3xl font-extrabold text-slate-200 mb-4">{systemMetrics.cpu_percent.toFixed(1)}%</div>
                      <div class="w-full bg-slate-950 rounded-full h-3 overflow-hidden border border-brand-border">
                        <div class="bg-brand-accent h-full transition-all duration-500" style={{ width: `${systemMetrics.cpu_percent}%` }}></div>
                      </div>
                    </div>
                    {/* Memory */}
                    <div class="bg-brand-card border border-brand-border p-5 rounded-2xl">
                      <span class="text-xs font-bold text-slate-500 uppercase tracking-wider block mb-2">Memory Usage</span>
                      <div class="text-3xl font-extrabold text-slate-200 mb-4">{systemMetrics.memory.percent.toFixed(1)}%</div>
                      <div class="w-full bg-slate-950 rounded-full h-3 overflow-hidden border border-brand-border">
                        <div class="bg-indigo-500 h-full transition-all duration-500" style={{ width: `${systemMetrics.memory.percent}%` }}></div>
                      </div>
                      <span class="text-[10px] text-slate-500 block mt-2 font-mono">
                        {(systemMetrics.memory.used / (1024 * 1024 * 1024)).toFixed(1)} GB / {(systemMetrics.memory.total / (1024 * 1024 * 1024)).toFixed(1)} GB
                      </span>
                    </div>
                    {/* Disk */}
                    <div class="bg-brand-card border border-brand-border p-5 rounded-2xl">
                      <span class="text-xs font-bold text-slate-500 uppercase tracking-wider block mb-2">Disk Capacity</span>
                      <div class="text-3xl font-extrabold text-slate-200 mb-4">{systemMetrics.disk.percent.toFixed(1)}%</div>
                      <div class="w-full bg-slate-950 rounded-full h-3 overflow-hidden border border-brand-border">
                        <div class="bg-slate-500 h-full transition-all duration-500" style={{ width: `${systemMetrics.disk.percent}%` }}></div>
                      </div>
                      <span class="text-[10px] text-slate-500 block mt-2 font-mono">
                        {(systemMetrics.disk.used / (1024 * 1024 * 1024)).toFixed(1)} GB / {(systemMetrics.disk.total / (1024 * 1024 * 1024)).toFixed(1)} GB
                      </span>
                    </div>
                  </div>
                </div>
              )}

              {activeTab === 'memory' && (
                <div class="space-y-6 flex-1 flex flex-col">
                  {/* Write Memory Form */}
                  <div class="bg-brand-card border border-brand-border rounded-2xl p-6 shadow-md">
                    <h2 class="text-md font-bold mb-4 flex items-center gap-2">
                      <span>✍️</span> Write Key-Value to Shared Memory
                    </h2>
                    <form onSubmit={handleWriteMemory} class="grid grid-cols-1 md:grid-cols-4 gap-4 items-end">
                      <div class="space-y-2">
                        <label class="text-xs text-slate-400 font-semibold">Namespace (Optional)</label>
                        <input
                          type="text"
                          placeholder="e.g. system"
                          value={newMemory.namespace}
                          onChange={(e) => setNewMemory({ ...newMemory, namespace: e.target.value })}
                          class="bg-brand-cardLight border border-brand-border px-3 py-2 rounded-lg text-sm text-slate-200 focus:outline-none w-full"
                        />
                      </div>
                      <div class="space-y-2">
                        <label class="text-xs text-slate-400 font-semibold">Database Key</label>
                        <input
                          type="text"
                          placeholder="e.g. status_flag"
                          value={newMemory.key}
                          onChange={(e) => setNewMemory({ ...newMemory, key: e.target.value })}
                          class="bg-brand-cardLight border border-brand-border px-3 py-2 rounded-lg text-sm text-slate-200 focus:outline-none w-full"
                        />
                      </div>
                      <div class="space-y-2">
                        <label class="text-xs text-slate-400 font-semibold">Serialized Value</label>
                        <input
                          type="text"
                          placeholder="e.g. active"
                          value={newMemory.value}
                          onChange={(e) => setNewMemory({ ...newMemory, value: e.target.value })}
                          class="bg-brand-cardLight border border-brand-border px-3 py-2 rounded-lg text-sm text-slate-200 focus:outline-none w-full"
                        />
                      </div>
                      <button type="submit" class="bg-brand-accent hover:bg-brand-accent/90 text-slate-950 font-bold text-sm px-5 py-2.5 rounded-lg shadow-md transition-all duration-200">
                        Commit Memory
                      </button>
                    </form>
                  </div>

                  {/* Active Memory items */}
                  <div id="memory-viewer" class="bg-brand-card border border-brand-border rounded-2xl p-6 shadow-md flex-1 flex flex-col">
                    <h2 class="text-md font-bold mb-4 flex items-center gap-2">
                      <span>💾</span> Shared Memory State Database
                    </h2>
                    <div class="overflow-x-auto flex-1">
                      <table class="w-full text-left text-sm">
                        <thead>
                          <tr class="border-b border-brand-border text-slate-400">
                            <th class="py-3 px-4 font-semibold">Memory Key String</th>
                            <th class="py-3 px-4 font-semibold">Stored Value Data</th>
                            <th class="py-3 px-4 text-right font-semibold">Action Operations</th>
                          </tr>
                        </thead>
                        <tbody class="divide-y divide-brand-border/60">
                          {Object.entries(memorySnapshot).map(([k, val]) => (
                            <tr key={k} class="hover:bg-slate-900/10">
                              <td class="py-3.5 px-4 font-mono text-xs text-brand-accent">{k}</td>
                              <td class="py-3.5 px-4 font-mono text-xs text-slate-300 max-w-sm truncate">{JSON.stringify(val)}</td>
                              <td class="py-3.5 px-4 text-right">
                                <button
                                  onClick={() => handleDeleteMemory(k)}
                                  class="bg-rose-500/20 hover:bg-rose-500 text-rose-300 hover:text-slate-950 border border-rose-500/30 text-xs font-bold px-2.5 py-1 rounded transition-colors"
                                >
                                  Delete
                                </button>
                              </td>
                            </tr>
                          ))}
                          {Object.keys(memorySnapshot).length === 0 && (
                            <tr>
                              <td colspan="3" class="py-8 text-center text-slate-500">No entries saved in the shared memory database.</td>
                            </tr>
                          )}
                        </tbody>
                      </table>
                    </div>
                  </div>
                </div>
              )}

              {activeTab === 'events' && (
                <div class="bg-brand-card border border-brand-border rounded-2xl p-6 shadow-md flex-1 flex flex-col">
                  <h2 class="text-md font-bold mb-4 flex items-center gap-2">
                    <span>📢</span> Event Bus Published Stream
                  </h2>
                  <div class="flex-1 overflow-y-auto space-y-3 font-mono text-xs">
                    {events.map((evt, index) => (
                      <div key={index} class="bg-brand-cardLight border border-brand-border p-3.5 rounded-xl flex flex-col md:flex-row md:items-center justify-between gap-3">
                        <div class="flex items-center gap-3">
                          <span class="bg-brand-accent/10 border border-brand-accent/20 px-2 py-0.5 rounded text-brand-accent font-bold uppercase tracking-wider">{evt.event_type}</span>
                          <span class="text-slate-200">{evt.payload?.details || evt.payload?.task || 'Event Dispatched'}</span>
                        </div>
                        <div class="text-slate-500 flex gap-4">
                          <span>Source: {evt.payload?.agent_id || 'System'}</span>
                          <span>{new Date(evt.timestamp).toLocaleTimeString()}</span>
                        </div>
                      </div>
                    ))}
                    {events.length === 0 && (
                      <div class="text-center py-8 text-slate-500">No events published in current session.</div>
                    )}
                  </div>
                </div>
              )}

              {activeTab === 'logs' && (
                <div class="bg-brand-card border border-brand-border rounded-2xl p-6 shadow-md flex-1 flex flex-col">
                  <h2 class="text-md font-bold mb-4 flex items-center gap-2">
                    <span>📝</span> Standard I/O Logs Output Traces
                  </h2>
                  <div class="flex-1 overflow-y-auto space-y-4">
                    {logsList.map((log, index) => (
                      <div key={index} class="border border-brand-border rounded-xl overflow-hidden shadow-sm">
                        <div class="bg-brand-cardLight border-b border-brand-border px-4 py-2.5 flex items-center justify-between text-xs text-slate-400">
                          <span>Agent Run: <strong class="text-brand-accent">{log.agent_id}</strong></span>
                          <span>Timestamp: {new Date(log.timestamp).toLocaleTimeString()}</span>
                        </div>
                        <div class="p-4 bg-brand-bg/50 font-mono text-xs text-emerald-400 leading-relaxed overflow-x-auto whitespace-pre">
                          {log.stdout && (
                            <div>
                              <span class="text-brand-accent font-bold block mb-1">STDOUT:</span>
                              {log.stdout}
                            </div>
                          )}
                          {log.stderr && (
                            <div class="mt-3">
                              <span class="text-rose-400 font-bold block mb-1">STDERR:</span>
                              {log.stderr}
                            </div>
                          )}
                        </div>
                      </div>
                    ))}
                    {logsList.length === 0 && (
                      <div class="text-center py-8 text-slate-500">No I/O trace captures available. Run tasks to populate logs.</div>
                    )}
                  </div>
                </div>
              )}

              {activeTab === 'settings' && (
                <div class="bg-brand-card border border-brand-border rounded-2xl p-6 shadow-md max-w-2xl">
                  <h2 class="text-md font-bold mb-6 flex items-center gap-2">
                    <span>⚙️</span> Global Microkernel & LLM Settings
                  </h2>
                  <form onSubmit={updateSettings} class="space-y-6">
                    {/* Qwen Cloud API Key */}
                    <div class="space-y-2">
                      <label class="text-sm font-semibold text-slate-300 block">Qwen / DashScope API Key</label>
                      <input
                        type="password"
                        placeholder="sk-..."
                        value={settings.qwen_api_key}
                        onChange={(e) => setSettings({ ...settings, qwen_api_key: e.target.value })}
                        class="bg-brand-cardLight border border-brand-border px-3 py-2 rounded-lg text-sm text-slate-200 focus:outline-none w-full font-mono"
                      />
                      <p class="text-xs text-slate-500 leading-relaxed">Required to call Alibaba Cloud Qwen Models. Leave empty to use offline mock responses.</p>
                    </div>

                    {/* Qwen Base URL */}
                    <div class="space-y-2">
                      <label class="text-sm font-semibold text-slate-300 block">Qwen API Base Endpoint Compatibility URL</label>
                      <input
                        type="text"
                        placeholder="https://dashscope.aliyuncs.com/compatible-mode/v1"
                        value={settings.qwen_base_url}
                        onChange={(e) => setSettings({ ...settings, qwen_base_url: e.target.value })}
                        class="bg-brand-cardLight border border-brand-border px-3 py-2 rounded-lg text-sm text-slate-200 focus:outline-none w-full"
                      />
                    </div>

                    {/* Qwen Model */}
                    <div class="space-y-2">
                      <label class="text-sm font-semibold text-slate-300 block">Qwen Model Identifier</label>
                      <input
                        type="text"
                        placeholder="qwen-max"
                        value={settings.qwen_model}
                        onChange={(e) => setSettings({ ...settings, qwen_model: e.target.value })}
                        class="bg-brand-cardLight border border-brand-border px-3 py-2 rounded-lg text-sm text-slate-200 focus:outline-none w-full"
                      />
                    </div>

                    {/* Parallel slots limit */}
                    <div class="space-y-2 pt-2 border-t border-brand-border/60">
                      <label class="text-sm font-semibold text-slate-300 block">Parallel Execution slots limit (Max Thread Workers)</label>
                      <div class="flex items-center gap-4">
                        <input
                          type="range"
                          min="1"
                          max="16"
                          value={settings.max_workers}
                          onChange={(e) => setSettings({ ...settings, max_workers: parseInt(e.target.value) })}
                          class="w-full accent-brand-accent h-1.5 bg-slate-900 rounded-lg appearance-none border border-brand-border cursor-pointer"
                        />
                        <span class="font-mono font-bold text-brand-accent text-md bg-brand-cardLight border border-brand-border px-3 py-1.5 rounded-lg min-w-[45px] text-center">
                          {settings.max_workers}
                        </span>
                      </div>
                      <p class="text-xs text-slate-500 leading-relaxed">Adjusts the thread allocation bounds managed by the concurrent ThreadPoolExecutor wrapper.</p>
                    </div>

                    <button type="submit" class="bg-brand-accent hover:bg-brand-accent/90 text-slate-950 font-bold text-sm px-6 py-2.5 rounded-lg shadow-md transition-all duration-200">
                      Apply & Persist configurations
                    </button>
                  </form>
                </div>
              )}
            </main>
          </div>
        </div>
      );
    }

    const container = document.getElementById('root');
    const root = ReactDOM.createRoot(container);
    root.render(<App />);
  </script>
</body>
</html>
